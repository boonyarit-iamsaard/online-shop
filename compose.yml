name: "online-shop"

services:
  postgres:
    container_name: "online-shop-postgres"
    image: "docker.io/postgres:17-alpine"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: online_shop
    ports:
      - "5432:5432"
    restart: "always"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - online-shop-network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -h localhost" ]
      interval: 5s
      timeout: 5s
      retries: 10

  mailpit:
    container_name: "online-shop-mailpit"
    image: "docker.io/axllent/mailpit:latest"
    ports:
      - "${MAIL_PORT:-1025}:1025"
      - "${MAILPIT_DASHBOARD_PORT:-8025}:8025"
    restart: "always"
    networks:
      - online-shop-network

volumes:
  pgdata:
    name: "online-shop-pgdata"

networks:
  online-shop-network:
    name: "online-shop-network"
