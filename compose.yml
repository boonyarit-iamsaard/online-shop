name: "finance-manager"

services:
  postgres:
    container_name: "finance-manager-postgres"
    image: "docker.io/postgres:17-alpine"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: finance_manager
    ports:
      - "5432:5432"
    restart: "always"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - finance-manager-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -h localhost"]
      interval: 5s
      timeout: 5s
      retries: 10

  mailpit:
    container_name: "finance-manager-mailpit"
    image: "docker.io/axllent/mailpit:latest"
    ports:
      - "${MAIL_PORT:-1025}:1025"
      - "${MAILPIT_DASHBOARD_PORT:-8025}:8025"
    restart: "always"
    networks:
      - finance-manager-network

volumes:
  pgdata:
    name: "finance-manager-pgdata"

networks:
  finance-manager-network:
    name: "finance-manager-network"
