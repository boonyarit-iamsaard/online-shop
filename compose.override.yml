services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: online-shop:dev
    container_name: online-shop-api
    environment:
      PORT: 8080
      DATABASE_URL: postgres://postgres:postgres@postgres/online_shop?sslmode=disable
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - online-shop-network
    restart: unless-stopped
